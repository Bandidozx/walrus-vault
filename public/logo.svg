<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#0f172a" rx="20"/>
  
  <!-- Gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Vault Door (main shape) -->
  <circle cx="100" cy="100" r="70" fill="url(#grad1)" opacity="0.9"/>
  
  <!-- Lock mechanism -->
  <circle cx="100" cy="100" r="50" fill="none" stroke="#ffffff" stroke-width="3"/>
  
  <!-- Keyhole -->
  <circle cx="100" cy="85" r="8" fill="#ffffff"/>
  <rect x="96" y="93" width="8" height="15" fill="#ffffff"/>
  
  <!-- Files inside vault -->
  <g transform="translate(70, 110)">
    <rect x="0" y="0" width="12" height="16" fill="#60a5fa" stroke="#ffffff" stroke-width="1"/>
    <line x1="2" y1="4" x2="10" y2="4" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="2" y1="7" x2="10" y2="7" stroke="#ffffff" stroke-width="0.5"/>
  </g>
  
  <g transform="translate(85, 115)">
    <rect x="0" y="0" width="12" height="16" fill="#60a5fa" stroke="#ffffff" stroke-width="1"/>
    <line x1="2" y1="4" x2="10" y2="4" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="2" y1="7" x2="10" y2="7" stroke="#ffffff" stroke-width="0.5"/>
  </g>
  
  <!-- Walrus text -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">WALRUS VAULT</text>
</svg>